<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Study — Learning Bahasa Indonesian</title>
<style>
  :root { color-scheme: light dark; --bg:#fff; --fg:#1a1a1a; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --card:#f9fafb; --blank:#f59e0b;
    --again:#dc2626; --hard:#d97706; --good:#16a34a; --easy:#2563eb; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#111318; --fg:#e7e9ee; --muted:#9aa1ac; --line:#2a2e37; --accent:#5b9dff;
      --card:#1a1d24; --blank:#fbbf24; --again:#f87171; --hard:#fbbf24; --good:#4ade80; --easy:#7cb0ff; }
  }
  * { box-sizing:border-box; }
  html, body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:28px 20px 60px; }
  .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  h1 { font-size:1.15rem; margin:0; }
  a.back { color:var(--muted); font-size:0.8rem; text-decoration:none; }
  .progress { color:var(--muted); font-size:0.8rem; margin-bottom:14px; }
  .bar { height:4px; background:var(--line); border-radius:2px; margin-bottom:18px; overflow:hidden; }
  .bar span { display:block; height:100%; background:var(--accent); width:0; transition:width 0.25s; }
  #card { border:1px solid var(--line); border-radius:14px; background:var(--card);
    min-height:220px; padding:24px 22px; margin:0 0 14px; }
  .kind { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px; }
  .prompt { font-size:1.2rem; line-height:1.5; margin-bottom:8px; }
  .prompt .blank { color:var(--blank); font-weight:700; letter-spacing:1px; }
  .hintline { color:var(--muted); font-size:0.82rem; margin-bottom:14px; }
  .playrow { margin-bottom:12px; }
  button.play { font-size:0.85rem; padding:8px 14px; border-radius:8px; border:1px solid var(--accent);
    background:transparent; color:var(--accent); cursor:pointer; }
  button.play:hover { background:var(--accent); color:#fff; }
  .reveal { display:none; border-top:1px dashed var(--line); margin-top:12px; padding-top:12px; }
  .reveal.shown { display:block; }
  .reveal .id { font-size:1.05rem; margin-bottom:4px; }
  .reveal .id b { color:var(--accent); }
  .reveal .en { color:var(--muted); font-size:0.9rem; }
  button.revealBtn { font-size:0.85rem; padding:8px 14px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--fg); cursor:pointer; }
  .rate { display:flex; gap:8px; margin-top:4px; }
  .rate[hidden] { display:none; }
  button.rate-btn { flex:1; padding:10px 4px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--fg); font-size:0.85rem; cursor:pointer; display:flex;
    flex-direction:column; align-items:center; gap:2px; }
  button.rate-btn:hover { filter:brightness(1.1); }
  button.rate-btn .prev { font-size:0.7rem; opacity:0.7; }
  button.rate-btn.again { border-color:var(--again); color:var(--again); }
  button.rate-btn.hard { border-color:var(--hard); color:var(--hard); }
  button.rate-btn.good { border-color:var(--good); color:var(--good); }
  button.rate-btn.easy { border-color:var(--easy); color:var(--easy); }
  .tools { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
  .stats { color:var(--muted); font-size:0.8rem; }
  .summary { text-align:center; padding:30px 10px; }
  .summary h2 { font-size:1.3rem; margin:0 0 8px; }
  .summary p { color:var(--muted); font-size:0.9rem; margin:6px 0; }
  .summary .tallies { display:flex; justify-content:center; gap:14px; margin:18px 0; }
  .summary .tallies div { text-align:center; }
  .summary .tallies .n { font-size:1.3rem; font-weight:700; }
  .summary .tallies .l { font-size:0.72rem; color:var(--muted); }
  .summary .t1 .n { color:var(--again); } .summary .t2 .n { color:var(--hard); }
  .summary .t3 .n { color:var(--good); } .summary .t4 .n { color:var(--easy); }
  .summary a, .summary button { font-size:0.85rem; padding:9px 14px; border-radius:8px;
    border:1px solid var(--line); background:var(--bg); color:var(--fg); cursor:pointer;
    text-decoration:none; display:inline-block; margin:4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Study session</h1>
    <a class="back" href="index.html">&larr; home</a>
  </div>
  <div class="progress" id="progress"></div>
  <div class="bar"><span id="barFill"></span></div>
  <div id="card"></div>
  <div class="rate" id="rateRow" hidden>
    <button class="rate-btn again" id="btn1"><span class="lbl">Again</span><span class="prev" id="prev1"></span></button>
    <button class="rate-btn hard" id="btn2"><span class="lbl">Hard</span><span class="prev" id="prev2"></span></button>
    <button class="rate-btn good" id="btn3"><span class="lbl">Good</span><span class="prev" id="prev3"></span></button>
    <button class="rate-btn easy" id="btn4"><span class="lbl">Easy</span><span class="prev" id="prev4"></span></button>
  </div>
  <div class="tools">
    <span class="stats" id="syncState"></span>
    <span class="stats" id="sessionInfo"></span>
  </div>
</div>
<audio id="qaudio" preload="none"></audio>
<script>

const DAY_MS = 24 * 60 * 60 * 1000;
const RELEARN_MS = 10 * 60 * 1000;
const MATURE_STABILITY_DAYS = 21;
const DESIRED_RETENTION = 0.9;

const FSRS_W = [
  0.40255, 1.18385, 3.173, 15.69105, 7.1949,
  0.5345, 1.4604, 0.0046, 1.54575, 0.1192,
  1.01925, 1.9395, 0.11, 0.29605, 2.2698,
  0.2315, 2.9898, 0.51655, 0.6621
];
const FSRS_F = 19 / 81;
const FSRS_C = -0.5;

function srsLoad(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; } catch (e) { return {}; }
}
function srsSave(key, s) { localStorage.setItem(key, JSON.stringify(s)); }

function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function clampD(d) { return clamp(d, 1, 10); }

function fsrsRetrievability(elapsedDays, stability) {
  if (elapsedDays <= 0) return 1;
  return Math.pow(1 + FSRS_F * (elapsedDays / stability), FSRS_C);
}

// Days until retrievability decays to `desiredR` starting from `stability`.
function fsrsIntervalDays(desiredR, stability) {
  return (stability / FSRS_F) * (Math.pow(desiredR, 1 / FSRS_C) - 1);
}

function fsrsInitialDifficulty(g) {
  return clampD(FSRS_W[4] - Math.exp(FSRS_W[5] * (g - 1)) + 1);
}
function fsrsInitialStability(g) {
  return FSRS_W[g - 1]; // W[0..3] are literally the four initial-stability values
}

function fsrsUpdateDifficulty(D, g) {
  const deltaD = -FSRS_W[6] * (g - 3);
  const dPrime = D + deltaD * ((10 - D) / 9);
  const mixed = FSRS_W[7] * fsrsInitialDifficulty(4) + (1 - FSRS_W[7]) * dPrime;
  return clampD(mixed);
}

function fsrsUpdateStability(S, D, R, g) {
  if (g === 1) {
    // Lapse: new stability can't exceed the pre-lapse stability.
    const sMin = FSRS_W[11] * Math.pow(D, -FSRS_W[12]) *
      (Math.pow(S + 1, FSRS_W[13]) - 1) * Math.exp(FSRS_W[14] * (1 - R));
    return Math.min(sMin, S);
  }
  const hardPenalty = g === 2 ? FSRS_W[15] : 1;
  const easyBonus = g === 4 ? FSRS_W[16] : 1;
  const growth = 1 + hardPenalty * easyBonus * Math.exp(FSRS_W[8]) *
    (11 - D) * Math.pow(S, -FSRS_W[9]) * (Math.exp(FSRS_W[10] * (1 - R)) - 1);
  return S * growth;
}

function fsrsUpdateSameDayStability(S, g) {
  return S * Math.exp(FSRS_W[17] * (g - 3 + FSRS_W[18]));
}

// Pure: computes the resulting state for grade g without touching storage.
// state is null/undefined for a never-reviewed card.
function fsrsNextState(state, g, now) {
  if (!state || !state.stability) {
    const S = fsrsInitialStability(g);
    const D = fsrsInitialDifficulty(g);
    const due = g === 1 ? now + RELEARN_MS : now + fsrsIntervalDays(DESIRED_RETENTION, S) * DAY_MS;
    return { difficulty: D, stability: S, due, lastReview: now, reps: g === 1 ? 0 : 1 };
  }
  const elapsedDays = Math.max(0, (now - state.lastReview) / DAY_MS);
  const R = fsrsRetrievability(elapsedDays, state.stability);
  const D = fsrsUpdateDifficulty(state.difficulty, g);
  const S = elapsedDays < 1
    ? fsrsUpdateSameDayStability(state.stability, g)
    : fsrsUpdateStability(state.stability, state.difficulty, R, g);
  const due = g === 1 ? now + RELEARN_MS : now + fsrsIntervalDays(DESIRED_RETENTION, S) * DAY_MS;
  const reps = g === 1 ? 0 : (state.reps || 0) + 1;
  return { difficulty: D, stability: S, due, lastReview: now, reps };
}

// { 1: 'Again', 2: 'Hard', 3: 'Good', 4: 'Easy' } -> formatted next-interval string,
// for showing an Anki-style preview on each rating button.
function fsrsPreviewLabels(state, now) {
  const out = {};
  for (let g = 1; g <= 4; g++) {
    const next = fsrsNextState(state, g, now);
    out[g] = srsFmtInterval(next.due - now);
  }
  return out;
}

function srsIsDue(state) {
  return !state || !state.due || state.due <= Date.now();
}
function srsIsMature(state) {
  return !!(state && state.stability >= MATURE_STABILITY_DAYS);
}

// ---- Daily new-card cap ----------------------------------------------------
// FSRS only stays sustainable if new cards trickle in; without a cap, adding
// a 97-card deck floods the next week with reviews. The counter is shared
// across flashcards/quiz/study so "15 new per day" means 15 total.
const NEW_CAP_KEY = 'bahasa:newToday:v1';
const NEW_PER_DAY = 15;

function srsTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function srsNewQuotaLeft() {
  const rec = srsLoad(NEW_CAP_KEY);
  if (rec.date !== srsTodayStr()) return NEW_PER_DAY;
  return Math.max(0, NEW_PER_DAY - (rec.n || 0));
}
function srsNoteNewIntroduced() {
  const rec = srsLoad(NEW_CAP_KEY);
  if (rec.date !== srsTodayStr()) { srsSave(NEW_CAP_KEY, { date: srsTodayStr(), n: 1 }); return; }
  srsSave(NEW_CAP_KEY, { date: rec.date, n: (rec.n || 0) + 1 });
}

// ---- Review log (feeds streak/heatmap/retention stats) ---------------------
// Map keyed by ms-timestamp -> {g: grade 1-4, k: kind, n: 1 if first-ever
// review of that item}. Capped to the newest LOG_CAP entries; synced across
// devices as a union (see _sync_js.py) so streaks survive switching devices.
const REVIEWLOG_KEY = 'bahasa:reviewLog:v1';
const REVIEWLOG_CAP = 2000;

function srsLogReview(kind, grade, isNew) {
  const log = srsLoad(REVIEWLOG_KEY);
  let t = Date.now();
  while (log[t]) t++;
  log[t] = { g: grade, k: kind, n: isNew ? 1 : 0 };
  const keys = Object.keys(log).map(Number).sort((a, b) => b - a);
  if (keys.length > REVIEWLOG_CAP) {
    for (const k of keys.slice(REVIEWLOG_CAP)) delete log[k];
  }
  srsSave(REVIEWLOG_KEY, log);
}

function srsFmtDue(ts) {
  if (!isFinite(ts)) return 'later';
  return srsFmtInterval(ts - Date.now());
}
function srsFmtInterval(ms) {
  if (ms <= 0) return 'now';
  const mins = Math.round(ms / 60000);
  if (mins < 60) return mins + 'm';
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + 'h';
  const days = Math.round(hrs / 24);
  if (days < 30) return days + 'd';
  const months = Math.round(days / 30);
  if (months < 12) return months + 'mo';
  return (Math.round(months / 12 * 10) / 10) + 'y';
}

// One-time migration from the old simplified-SM2 state (ease/interval/reps,
// no difficulty/stability) into FSRS state, then removes the legacy key.
// Items with reps >= 1 are seeded as if their most recent rating was "Good"
// (grade 3), using their old interval as a stability floor, and are put up
// for immediate re-review under the new model rather than guessing a
// mapping that doesn't really exist between the two systems.
function srsMigrateLegacy(srsKey, legacyKeys) {
  let srs = srsLoad(srsKey);
  for (const legacyKey of legacyKeys) {
    const legacy = srsLoad(legacyKey);
    if (!Object.keys(legacy).length) continue;
    for (const [id, v] of Object.entries(legacy)) {
      if (srs[id]) continue;
      const hasProgress = v && ((v.reps || 0) >= 1 || (v.box || 0) >= 1);
      const S = hasProgress ? Math.max(fsrsInitialStability(3), v.interval || 0) : fsrsInitialStability(3);
      srs[id] = {
        difficulty: fsrsInitialDifficulty(3),
        stability: S,
        due: Date.now(),
        lastReview: Date.now(),
        reps: hasProgress ? 1 : 0,
      };
    }
    localStorage.removeItem(legacyKey);
  }
  srsSave(srsKey, srs);
  return srs;
}


const SYNC_FORMAT = 1;
const SYNC_APP_ID = 'learning-bahasa-indonesian';
const FSRS_KEYS = ['bahasa:flashcards:fsrs:v1', 'bahasa:quiz:fsrs:v1'];
const FLAG_KEY = 'bahasa:flaggedLines:v1';
const REMOVED_CARDS_KEY = 'bahasa:flashcards:removed:v1';
const CUSTOM_CARDS_KEY = 'bahasa:flashcards:custom:v1';
// REVIEWLOG_KEY is declared in the SRS module, which is always embedded
// before this one on pages that have both; index.html embeds only this
// module, so declare a local fallback name instead of referencing it.
const SYNC_REVIEWLOG_KEY = 'bahasa:reviewLog:v1';
const SYNC_KEYS = [...FSRS_KEYS, FLAG_KEY, REMOVED_CARDS_KEY, CUSTOM_CARDS_KEY, SYNC_REVIEWLOG_KEY];

function syncRead(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; } catch (e) { return {}; }
}
function syncWrite(key, v) { localStorage.setItem(key, JSON.stringify(v)); }

function syncBuildExport() {
  const data = {};
  SYNC_KEYS.forEach(k => { data[k] = syncRead(k); });
  return {
    app: SYNC_APP_ID,
    formatVersion: SYNC_FORMAT,
    exportedAt: Date.now(),
    exportedAtISO: new Date().toISOString(),
    data,
  };
}

// Per item id, keep whichever side was reviewed more recently.
function syncMergeFsrs(local, incoming) {
  const out = Object.assign({}, local);
  let added = 0, updated = 0, kept = 0;
  for (const [id, inc] of Object.entries(incoming || {})) {
    const cur = out[id];
    if (!cur) { out[id] = inc; added++; continue; }
    if ((inc.lastReview || 0) > (cur.lastReview || 0)) { out[id] = inc; updated++; }
    else kept++;
  }
  return { out, added, updated, kept };
}

function syncMergeFlags(local, incoming) {
  const out = Object.assign({}, local);
  let added = 0;
  for (const id of Object.keys(incoming || {})) {
    if (!out[id]) { out[id] = incoming[id]; added++; }
  }
  return { out, added };
}

// Generic version of syncMergeFsrs's rule (later `field` wins) for any
// id -> {..., [field]: timestamp} map — used for custom flashcards, keyed by
// `updatedAt` instead of `lastReview`.
function syncMergeByField(local, incoming, field) {
  const out = Object.assign({}, local);
  let added = 0, updated = 0, kept = 0;
  for (const [id, inc] of Object.entries(incoming || {})) {
    const cur = out[id];
    if (!cur) { out[id] = inc; added++; continue; }
    if ((inc[field] || 0) > (cur[field] || 0)) { out[id] = inc; updated++; }
    else kept++;
  }
  return { out, added, updated, kept };
}

// Returns a human-readable summary, or throws with a useful message.
function syncApplyImport(payload) {
  if (!payload || typeof payload !== 'object') throw new Error('That file isn\'t valid JSON.');
  if (payload.app !== SYNC_APP_ID) {
    throw new Error('That file isn\'t a Bahasa Player progress export.');
  }
  if ((payload.formatVersion || 0) > SYNC_FORMAT) {
    throw new Error('That export came from a newer version of the app than this one.');
  }
  const bits = [];
  let touched = 0;
  for (const key of FSRS_KEYS) {
    const r = syncMergeFsrs(syncRead(key), (payload.data || {})[key]);
    syncWrite(key, r.out);
    touched += r.added + r.updated;
    const label = key.includes('flashcards') ? 'flashcards' : 'quiz items';
    bits.push(`${label}: ${r.added} new, ${r.updated} updated, ${r.kept} already newer here`);
  }
  const f = syncMergeFlags(syncRead(FLAG_KEY), (payload.data || {})[FLAG_KEY]);
  syncWrite(FLAG_KEY, f.out);
  touched += f.added;
  bits.push(`flagged lines: ${f.added} new`);

  const rm = syncMergeFlags(syncRead(REMOVED_CARDS_KEY), (payload.data || {})[REMOVED_CARDS_KEY]);
  syncWrite(REMOVED_CARDS_KEY, rm.out);
  touched += rm.added;
  bits.push(`removed flashcards: ${rm.added} new`);

  const cc = syncMergeByField(syncRead(CUSTOM_CARDS_KEY), (payload.data || {})[CUSTOM_CARDS_KEY], 'updatedAt');
  syncWrite(CUSTOM_CARDS_KEY, cc.out);
  touched += cc.added + cc.updated;
  bits.push(`custom flashcards: ${cc.added} new, ${cc.updated} updated, ${cc.kept} already newer here`);

  // Review log: union by timestamp key, then trim to the newest 2000 so the
  // payload can't grow without bound.
  const lg = syncMergeFlags(syncRead(SYNC_REVIEWLOG_KEY), (payload.data || {})[SYNC_REVIEWLOG_KEY]);
  const lgKeys = Object.keys(lg.out).map(Number).sort((a, b) => b - a);
  for (const k of lgKeys.slice(2000)) delete lg.out[k];
  syncWrite(SYNC_REVIEWLOG_KEY, lg.out);
  touched += lg.added;

  const when = payload.exportedAtISO ? new Date(payload.exportedAtISO).toLocaleString() : 'unknown date';
  return { touched, text: `Merged export from ${when}.\n` + bits.join('\n') };
}

function syncCounts() {
  const fc = Object.keys(syncRead('bahasa:flashcards:fsrs:v1')).length;
  const qz = Object.keys(syncRead('bahasa:quiz:fsrs:v1')).length;
  const fl = Object.keys(syncRead(FLAG_KEY)).length;
  return { fc, qz, fl };
}

// ---- Remote auto-sync via a private GitHub Gist ----------------------------
// The gist holds exactly one file (SYNC_FILENAME) whose content is the same
// payload syncBuildExport() produces, so pull can reuse syncApplyImport().
// Token requirement: a CLASSIC personal-access token with only the `gist`
// scope (fine-grained tokens can't access the gist API). Stored in this
// browser's localStorage only.

const SYNC_TOKEN_KEY = 'bahasa:sync:token';
const SYNC_GIST_KEY = 'bahasa:sync:gistId';
const SYNC_LAST_KEY = 'bahasa:sync:lastSync';
const SYNC_FILENAME = 'bahasa-progress.json';
const GH_API = 'https://api.github.com';

function syncRemoteConfigured() {
  return !!(localStorage.getItem(SYNC_TOKEN_KEY) && localStorage.getItem(SYNC_GIST_KEY));
}
function syncGhHeaders() {
  return {
    'Authorization': 'Bearer ' + localStorage.getItem(SYNC_TOKEN_KEY),
    'Accept': 'application/vnd.github+json',
  };
}

// Find this browser's user's progress gist, or create it. Stores token+id.
async function syncRemoteSetup(token) {
  const headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' };
  let resp = await fetch(GH_API + '/gists?per_page=100', { headers });
  if (resp.status === 401) throw new Error('GitHub rejected that token. Is it a classic token with the gist scope?');
  if (!resp.ok) throw new Error('GitHub error ' + resp.status + ' while listing gists.');
  const gists = await resp.json();
  let gist = gists.find(g => g.files && g.files[SYNC_FILENAME]);
  if (!gist) {
    resp = await fetch(GH_API + '/gists', {
      method: 'POST', headers,
      body: JSON.stringify({
        description: 'Bahasa Player progress sync (created automatically)',
        public: false,
        files: { [SYNC_FILENAME]: { content: JSON.stringify(syncBuildExport()) } },
      }),
    });
    if (!resp.ok) throw new Error('Could not create the sync gist (HTTP ' + resp.status + '). Does the token have the gist scope?');
    gist = await resp.json();
  }
  localStorage.setItem(SYNC_TOKEN_KEY, token);
  localStorage.setItem(SYNC_GIST_KEY, gist.id);
  return gist.id;
}

async function syncRemotePull() {
  const id = localStorage.getItem(SYNC_GIST_KEY);
  const resp = await fetch(GH_API + '/gists/' + id, { headers: syncGhHeaders() });
  if (resp.status === 404) throw new Error('Sync gist not found — it may have been deleted. Disconnect and reconnect.');
  if (!resp.ok) throw new Error('Pull failed (HTTP ' + resp.status + ').');
  const gist = await resp.json();
  const file = gist.files && gist.files[SYNC_FILENAME];
  if (!file) return { touched: 0, text: 'Remote gist has no progress file yet.' };
  let content = file.content;
  if (file.truncated) content = await (await fetch(file.raw_url)).text();
  let payload;
  try { payload = JSON.parse(content); } catch (e) { return { touched: 0, text: 'Remote progress file was unreadable; it will be overwritten on next push.' }; }
  const r = syncApplyImport(payload);
  localStorage.setItem(SYNC_LAST_KEY, String(Date.now()));
  return r;
}

// Pull-merge first so this device's push can never clobber another device's
// newer reviews, then upload the merged state.
async function syncRemotePush() {
  try { await syncRemotePull(); } catch (e) { /* offline pull is fine; push may still work */ }
  const id = localStorage.getItem(SYNC_GIST_KEY);
  const resp = await fetch(GH_API + '/gists/' + id, {
    method: 'PATCH', headers: syncGhHeaders(),
    body: JSON.stringify({ files: { [SYNC_FILENAME]: { content: JSON.stringify(syncBuildExport()) } } }),
  });
  if (!resp.ok) throw new Error('Push failed (HTTP ' + resp.status + ').');
  localStorage.setItem(SYNC_LAST_KEY, String(Date.now()));
}

let _syncPushTimer = null;
function syncRemoteQueuePush(statusCb) {
  if (!syncRemoteConfigured()) return;
  if (_syncPushTimer) clearTimeout(_syncPushTimer);
  statusCb && statusCb('pending');
  _syncPushTimer = setTimeout(async () => {
    _syncPushTimer = null;
    try { await syncRemotePush(); statusCb && statusCb('ok'); }
    catch (e) { statusCb && statusCb('err'); }
  }, 2500);
}

// Best-effort flush if the tab is backgrounded while a push is still queued.
// Skips the pre-pull; keepalive bodies are size-capped (~64KB) so this can
// silently no-op on very large state — the next normal push covers it.
async function syncRemoteFlush() {
  const id = localStorage.getItem(SYNC_GIST_KEY);
  if (!id) return;
  try {
    await fetch(GH_API + '/gists/' + id, {
      method: 'PATCH', headers: syncGhHeaders(), keepalive: true,
      body: JSON.stringify({ files: { [SYNC_FILENAME]: { content: JSON.stringify(syncBuildExport()) } } }),
    });
    localStorage.setItem(SYNC_LAST_KEY, String(Date.now()));
  } catch (e) { /* best effort */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && _syncPushTimer) {
    clearTimeout(_syncPushTimer);
    _syncPushTimer = null;
    syncRemoteFlush();
  }
});

// Page-load hook: pull, merge, and let the page refresh its UI if anything
// actually changed.
async function syncRemoteAutoPull(onMerged, statusCb) {
  if (!syncRemoteConfigured()) return;
  statusCb && statusCb('pending');
  try {
    const r = await syncRemotePull();
    statusCb && statusCb('ok');
    if (r.touched && onMerged) onMerged(r);
  } catch (e) { statusCb && statusCb('err'); }
}

function syncRemoteDisconnect() {
  localStorage.removeItem(SYNC_TOKEN_KEY);
  localStorage.removeItem(SYNC_GIST_KEY);
  localStorage.removeItem(SYNC_LAST_KEY);
}

const FLASH_SRS_KEY = 'bahasa:flashcards:fsrs:v1';
const QUIZ_SRS_KEY = 'bahasa:quiz:fsrs:v1';
const audio = document.getElementById('qaudio');

let srsF = srsLoad(FLASH_SRS_KEY);
let srsQ = srsLoad(QUIZ_SRS_KEY);

function setSyncState(s) {
  const el = document.getElementById('syncState');
  if (!syncRemoteConfigured()) { el.textContent = ''; return; }
  el.textContent = s === 'pending' ? 'syncing…' : s === 'err' ? 'sync failed' : 'synced ✓';
}

// Same deck-layering as flashcards.html: tombstones out, custom cards in.
function normalizeCard(d) {
  if (Array.isArray(d.tags) && d.tags.length) return d;
  return Object.assign({}, d, { tags: d.tag ? [d.tag] : ['custom'] });
}
function computeFlashItems() {
  const removed = syncRead(REMOVED_CARDS_KEY);
  const custom = syncRead(CUSTOM_CARDS_KEY);
  const byFront = new Map();
  FLASH_DECK.forEach(d => { if (!removed[d.front]) byFront.set(d.front, d); });
  Object.values(custom).forEach(d => byFront.set(d.front, normalizeCard(d)));
  return [...byFront.values()].map(d => Object.assign({ kind: 'flash' }, d));
}
function computeQuizItems() {
  const flags = syncRead(FLAG_KEY);
  return QUIZ_ITEMS.filter(d => !flags[d.lineId]);
}

function stateFor(item) { return item.kind === 'flash' ? srsF[item.front] : srsQ[item.id]; }
function setState(item, s) {
  if (item.kind === 'flash') { srsF[item.front] = s; srsSave(FLASH_SRS_KEY, srsF); }
  else { srsQ[item.id] = s; srsSave(QUIZ_SRS_KEY, srsQ); }
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Session = every due review (shuffled, so kinds interleave naturally) with
// today's remaining new-card quota sprinkled in one per few reviews.
let session = [], idx = 0, tallies = { 1: 0, 2: 0, 3: 0, 4: 0 }, startedAt = null;
let practiceRun = false;

function buildSession(practice) {
  practiceRun = !!practice;
  const all = [...computeFlashItems(), ...computeQuizItems()];
  if (practice) {
    session = shuffle(all.filter(i => stateFor(i))).slice(0, 20);
  } else {
    const reviews = shuffle(all.filter(i => stateFor(i) && srsIsDue(stateFor(i))));
    const fresh = shuffle(all.filter(i => !stateFor(i))).slice(0, srsNewQuotaLeft());
    session = [];
    let f = 0;
    for (let r = 0; r < reviews.length; r++) {
      session.push(reviews[r]);
      if ((r + 1) % 3 === 0 && f < fresh.length) session.push(fresh[f++]);
    }
    while (f < fresh.length) session.push(fresh[f++]);
  }
  idx = 0;
  tallies = { 1: 0, 2: 0, 3: 0, 4: 0 };
  startedAt = Date.now();
}

const cardEl = document.getElementById('card');
const rateRow = document.getElementById('rateRow');
let current = null, revealed = false, stopAt = null;
let userInteracted = false;

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

const KIND_LABEL = { flash: 'Flashcard', word: 'Fill the blank', sentence: 'Whole sentence', listening: 'By ear' };

function renderCard() {
  const item = current;
  let promptHtml, hintLine = '', revealInner, playRow = '';
  if (item.kind === 'flash') {
    promptHtml = escapeHtml(item.front);
    revealInner = `<div class="id">${escapeHtml(item.back)}</div><div class="en">${escapeHtml(item.tags.join(' · '))}</div>`;
  } else if (item.kind === 'word') {
    promptHtml = item.mode === 'cloze'
      ? escapeHtml(item.cloze).replace('_____', '<span class="blank">_____</span>')
      : '🔊 Listen first, then reveal.';
    hintLine = `<div class="hintline">clue: ${escapeHtml(item.hint)}</div>`;
    revealInner = `<div class="id">${item.sentenceHtml}</div><div class="en">${item.translation ? escapeHtml(item.translation) : ''}</div>`;
    playRow = '<div class="playrow"><button class="play" id="playBtn">&#9654; Play line</button></div>';
  } else if (item.kind === 'sentence') {
    promptHtml = item.sentenceHtml;
    revealInner = `<div class="en">${escapeHtml(item.translation)}</div>`;
    playRow = '<div class="playrow"><button class="play" id="playBtn">&#9654; Play line</button></div>';
  } else { // listening
    promptHtml = '🎧 Listen — no peeking. Press play (or "p") and try to catch the whole line.';
    revealInner = `<div class="id">${item.sentenceHtml}</div><div class="en">${escapeHtml(item.translation)}</div>`;
    playRow = '<div class="playrow"><button class="play" id="playBtn">&#9654; Play line</button></div>';
  }
  cardEl.innerHTML = `
    <div class="kind">${KIND_LABEL[item.kind]}${stateFor(item) ? '' : ' · new'}</div>
    <div class="prompt">${promptHtml}</div>
    ${hintLine}
    ${playRow}
    <button class="revealBtn" id="revealBtn">Reveal</button>
    <div class="reveal" id="revealBox">${revealInner}</div>
  `;
  rateRow.hidden = true;
  const pb = document.getElementById('playBtn');
  if (pb) pb.addEventListener('click', playLine);
  document.getElementById('revealBtn').addEventListener('click', reveal);
  updatePlayBtnLabel();
  renderProgress();
  if (item.kind === 'listening' && userInteracted) playLine();
}

function renderProgress() {
  document.getElementById('progress').textContent =
    `${Math.min(idx + 1, session.length)} of ${session.length}` + (practiceRun ? ' · practice (ignores schedule)' : '');
  document.getElementById('barFill').style.width = (session.length ? (idx / session.length) * 100 : 0) + '%';
  document.getElementById('sessionInfo').textContent =
    `${tallies[1] + tallies[2] + tallies[3] + tallies[4]} answered`;
}

function reveal() {
  revealed = true;
  document.getElementById('revealBox').classList.add('shown');
  rateRow.hidden = false;
  const labels = fsrsPreviewLabels(stateFor(current), Date.now());
  for (let g = 1; g <= 4; g++) document.getElementById('prev' + g).textContent = labels[g];
}

function rate(grade) {
  if (!current || !revealed) return;
  const isNew = !stateFor(current);
  if (isNew) srsNoteNewIntroduced();
  srsLogReview(current.kind, grade, isNew);
  setState(current, fsrsNextState(stateFor(current), grade, Date.now()));
  syncRemoteQueuePush(setSyncState);
  tallies[grade]++;
  idx++;
  next();
}

function next() {
  audio.pause();
  stopAt = null;
  revealed = false;
  if (idx >= session.length) { renderSummary(); return; }
  current = session[idx];
  renderCard();
}

function renderSummary() {
  current = null;
  rateRow.hidden = true;
  const total = tallies[1] + tallies[2] + tallies[3] + tallies[4];
  const mins = Math.max(1, Math.round((Date.now() - startedAt) / 60000));
  const all = [...computeFlashItems(), ...computeQuizItems()];
  const now = Date.now();
  const dues = all.map(i => (stateFor(i) && stateFor(i).due) || Infinity);
  const nextDue = Math.min(...dues);
  const in24h = all.filter(i => stateFor(i) && stateFor(i).due > now && stateFor(i).due <= now + 86400000).length;
  document.getElementById('progress').textContent = '';
  document.getElementById('barFill').style.width = '100%';
  cardEl.innerHTML = `
    <div class="summary">
      <h2>${total ? '🎉 Session done!' : 'Nothing due right now'}</h2>
      ${total ? `<div class="tallies">
        <div class="t1"><div class="n">${tallies[1]}</div><div class="l">Again</div></div>
        <div class="t2"><div class="n">${tallies[2]}</div><div class="l">Hard</div></div>
        <div class="t3"><div class="n">${tallies[3]}</div><div class="l">Good</div></div>
        <div class="t4"><div class="n">${tallies[4]}</div><div class="l">Easy</div></div>
      </div>
      <p>${total} answered in ~${mins} min.</p>` : ''}
      <p>Next review ${srsFmtDue(nextDue)}${in24h ? ` · ${in24h} due within 24h` : ''}.</p>
      <div>
        <button id="moreBtn">Practice 20 more</button>
        <a href="index.html">Done for now</a>
      </div>
    </div>`;
  document.getElementById('moreBtn').addEventListener('click', () => { buildSession(true); next(); });
}

// ---- audio (same clip logic as quiz.html) ----
function isWithinCurrentClip() {
  return current && current.audio && audio.src.endsWith(current.audio) && audio.readyState >= 1 &&
    audio.currentTime >= current.sec - 0.25 && audio.currentTime < current.nextSec;
}
function playLine() {
  if (!current || !current.audio) return;
  if (isWithinCurrentClip()) {
    if (audio.paused) { stopAt = current.nextSec; audio.play(); } else { audio.pause(); }
    return;
  }
  stopAt = current.nextSec;
  const start = () => { audio.currentTime = current.sec; audio.play(); };
  if (audio.src.endsWith(current.audio) && audio.readyState >= 1) {
    start();
  } else {
    audio.src = current.audio;
    audio.addEventListener('loadedmetadata', start, { once: true });
    audio.load();
  }
}
function updatePlayBtnLabel() {
  const btn = document.getElementById('playBtn');
  if (!btn) return;
  btn.innerHTML = (!audio.paused && isWithinCurrentClip()) ? '&#10073;&#10073; Pause' : '&#9654; Play line';
}
audio.addEventListener('play', updatePlayBtnLabel);
audio.addEventListener('pause', updatePlayBtnLabel);
audio.addEventListener('timeupdate', () => {
  if (stopAt !== null && audio.currentTime >= stopAt) { audio.pause(); stopAt = null; }
  updatePlayBtnLabel();
});

// ---- input wiring ----
[1, 2, 3, 4].forEach(g => {
  document.getElementById('btn' + g).addEventListener('click', () => rate(g));
});
document.addEventListener('pointerdown', () => { userInteracted = true; }, { capture: true });
document.addEventListener('keydown', (e) => {
  userInteracted = true;
  if (e.key === 'p') { playLine(); return; }
  if (e.key === ' ' && current && !revealed) { e.preventDefault(); reveal(); return; }
  if (revealed && ['1', '2', '3', '4'].includes(e.key)) rate(parseInt(e.key, 10));
});

// Swipe-to-rate once revealed: right = Good, left = Again.
let touchX = null, touchY = null;
cardEl.addEventListener('touchstart', (e) => {
  touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
}, { passive: true });
cardEl.addEventListener('touchend', (e) => {
  if (touchX === null || !revealed || !current) { touchX = null; return; }
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  touchX = null;
  if (Math.abs(dx) > 60 && Math.abs(dy) < 40) rate(dx > 0 ? 3 : 1);
});

// ---- go ----
buildSession(false);
next();
syncRemoteAutoPull(() => {
  srsF = srsLoad(FLASH_SRS_KEY);
  srsQ = srsLoad(QUIZ_SRS_KEY);
  // Only rebuild if the user hasn't started answering yet — never yank a
  // half-finished session out from under them.
  if (tallies[1] + tallies[2] + tallies[3] + tallies[4] === 0) { buildSession(false); next(); }
}, setSyncState);
</script>
