<style>
  :root { color-scheme: light dark; --bg:#fff; --fg:#1a1a1a; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --card:#f9fafb; --good:#16a34a; --bad:#dc2626; --blank:#f59e0b; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#111318; --fg:#e7e9ee; --muted:#9aa1ac; --line:#2a2e37; --accent:#5b9dff;
      --card:#1a1d24; --good:#4ade80; --bad:#f87171; --blank:#fbbf24; }
  }
  * { box-sizing:border-box; }
  html, body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:28px 20px 60px; }
  .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  h1 { font-size:1.15rem; margin:0; }
  a.back { color:var(--muted); font-size:0.8rem; text-decoration:none; }
  .stats { color:var(--muted); font-size:0.8rem; margin-bottom:16px; }
  select { font-size:0.8rem; padding:5px 7px; border-radius:6px; border:1px solid var(--line);
    background:var(--bg); color:var(--fg); }
  #card { border:1px solid var(--line); border-radius:14px; background:var(--card);
    min-height:200px; padding:24px 22px; margin:18px 0; }
  .source { font-size:0.72rem; color:var(--muted); margin-bottom:10px; }
  .prompt { font-size:1.15rem; line-height:1.5; margin-bottom:6px; }
  .prompt .blank { color:var(--blank); font-weight:700; letter-spacing:1px; }
  .hint { color:var(--muted); font-size:0.82rem; margin-bottom:16px; }
  .playrow { margin-bottom:14px; }
  button.play { font-size:0.85rem; padding:8px 14px; border-radius:8px; border:1px solid var(--accent);
    background:transparent; color:var(--accent); cursor:pointer; }
  button.play:hover { background:var(--accent); color:#fff; }
  .reveal { display:none; border-top:1px dashed var(--line); margin-top:14px; padding-top:14px; }
  .reveal.shown { display:block; }
  .reveal .id { font-size:1.05rem; margin-bottom:4px; }
  .reveal .id b { color:var(--accent); }
  .reveal .en { color:var(--muted); font-size:0.9rem; }
  button.revealBtn { font-size:0.85rem; padding:8px 14px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--fg); cursor:pointer; }
  .rate { display:flex; gap:10px; margin-top:14px; }
  .rate[hidden] { display:none; }
  button.rate-btn { flex:1; padding:12px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--fg); font-size:0.9rem; cursor:pointer; }
  button.rate-btn.bad { border-color:var(--bad); color:var(--bad); }
  button.rate-btn.good { border-color:var(--good); color:var(--good); }
  .tools { display:flex; justify-content:space-between; align-items:center; margin-top:24px; }
  button.plain { font-size:0.78rem; padding:6px 10px; border-radius:6px; border:1px solid var(--line);
    background:var(--bg); color:var(--muted); cursor:pointer; }
  .empty { color:var(--muted); font-size:0.9rem; text-align:center; margin-top:60px; }
</style>
</head>

": 3908, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "suku", "hint": "ethnic group / tribe (Bali, Lombok/Sasak, Madura, Jawa etc.)", "tag": "culture", "mode": "cloze", "sentence": "Oh, iya. Nggak, nggak satu suku. Jadi ada Bali, Lombok.", "sentenceHtml": "Oh, iya. Nggak, nggak satu <b>suku</b>. Jadi ada Bali, Lombok.", "cloze": "Oh, iya. Nggak, nggak satu _____. Jadi ada Bali, Lombok.", "translation": "Oh, right. No, it's not just one ethnic group. So there's Bali, Lombok.", "sec": 3651, "nextSec": 3655, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Ini dari sana?", "hint": "Is this from there?", "tag": "phrase", "mode": "recall", "sentence": "Ini dari sana?", "sentenceHtml": "<b>Ini dari sana?</b>", "cloze": null, "translation": "Is this from over there?", "sec": 1181, "nextSec": 1182, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Nggak apa-apa", "hint": "It's okay / no worries / it doesn't matter", "tag": "phrase", "mode": "recall", "sentence": "Nggak apa-apa.", "sentenceHtml": "<b>Nggak apa-apa</b>.", "cloze": null, "translation": "It's fine.", "sec": 344, "nextSec": 346, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Ayo kita nonton", "hint": "Let's go watch [something]", "tag": "phrase", "mode": "recall", "sentence": "Ayo kita nonton?", "sentenceHtml": "<b>Ayo kita nonton</b>?", "cloze": null, "translation": "Let's go watch [something]?", "sec": 3291, "nextSec": 3293, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Sudah semakin lancar", "hint": "[You're] getting more fluent already", "tag": "phrase", "mode": "recall", "sentence": "Sudah semakin lancar.", "sentenceHtml": "<b>Sudah semakin lancar</b>.", "cloze": null, "translation": "It's getting more fluent already.", "sec": 642, "nextSec": 650, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Tahu kan berapa nih harganya?", "hint": "You know how much this costs, right?", "tag": "phrase", "mode": "recall", "sentence": "Tahu kan berapa nih harganya?", "sentenceHtml": "<b>Tahu kan berapa nih harganya?</b>", "cloze": null, "translation": "You know how much this costs, right?", "sec": 3911, "nextSec": 3914, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Kalau tak dengar suaramu", "hint": "If I don't hear your voice (song lyric quoted mid-conversation)", "tag": "phrase", "mode": "cloze", "sentence": "Semalam saja tak mampu. Kalau tak dengar suaramu itu. I'm not feeling feel for.", "sentenceHtml": "Semalam saja tak mampu. <b>Kalau tak dengar suaramu</b> itu. I&#x27;m not feeling feel for.", "cloze": "Semalam saja tak mampu. _____ itu. I'm not feeling feel for.", "translation": "Just last night I couldn't handle it. When I don't hear your voice. I'm not feeling it.", "sec": 1050, "nextSec": 1058, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Jangan ganggu", "hint": "Don't disturb [me]", "tag": "phrase", "mode": "recall", "sentence": "Jangan ganggu.", "sentenceHtml": "<b>Jangan ganggu</b>.", "cloze": null, "translation": "Don't bother her.", "sec": 3301, "nextSec": 3303, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Sabar", "hint": "Be patient / hang on", "tag": "phrase", "mode": "recall", "sentence": "Sabar.", "sentenceHtml": "<b>Sabar</b>.", "cloze": null, "translation": "Hold on.", "sec": 428, "nextSec": 429, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Ya udah", "hint": "Alright then / fine, okay — resigned agreement", "tag": "phrase", "mode": "cloze", "sentence": "Ya udah, adik makan aja. Siapa tahu ini buat di rumah. Eh, entar dulu, tak tanya.", "sentenceHtml": "<b>Ya udah</b>, adik makan aja. Siapa tahu ini buat di rumah. Eh, entar dulu, tak tanya.", "cloze": "_____, adik makan aja. Siapa tahu ini buat di rumah. Eh, entar dulu, tak tanya.", "translation": "Okay then, just eat, sis. Who knows, maybe this is for at home. Oh wait, hold on, let me ask.", "sec": 4057, "nextSec": 4062, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Nggak seru", "hint": "Not fun / that's no fun", "tag": "phrase", "mode": "recall", "sentence": "Nggak seru.", "sentenceHtml": "<b>Nggak seru</b>.", "cloze": null, "translation": "Not fun.", "sec": 3589, "nextSec": 3590, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Apa namanya?", "hint": "What's it called again? — filler while searching for a word", "tag": "phrase", "mode": "cloze", "sentence": "Apa namanya? Soniox.", "sentenceHtml": "<b>Apa namanya?</b> Soniox.", "cloze": "_____ Soniox.", "translation": "What's it called? Soniox.", "sec": 79, "nextSec": 81, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Kamu mau download di anu, di laptopmu?", "hint": "Do you want to download it on your laptop?", "tag": "phrase", "mode": "recall", "sentence": "Kamu mau download di anu, di laptopmu?", "sentenceHtml": "<b>Kamu mau download di anu, di laptopmu?</b>", "cloze": null, "translation": "Do you want to download it on your, um, your laptop?", "sec": 128, "nextSec": 136, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Nggak keaslian", "hint": "It's not the real/original one", "tag": "phrase", "mode": "cloze", "sentence": "Bu Di, biar sifatnya nggak keaslian.", "sentenceHtml": "Bu Di, biar sifatnya <b>nggak keaslian</b>.", "cloze": "Bu Di, biar sifatnya _____.", "translation": "Bu Di, so it doesn't come off as fake.", "sec": 459, "nextSec": 465, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Terlalu maksa", "hint": "That's too forced / trying too hard", "tag": "phrase", "mode": "recall", "sentence": "Terlalu maksa.", "sentenceHtml": "<b>Terlalu maksa</b>.", "cloze": null, "translation": "That's too forced.", "sec": 3579, "nextSec": 3580, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}, {"term": "Kok aneh", "hint": "That's weird, huh", "tag": "phrase", "mode": "recall", "sentence": "Kok aneh.", "sentenceHtml": "<b>Kok aneh</b>.", "cloze": null, "translation": "That's weird.", "sec": 3954, "nextSec": 3962, "audio": "audio/conversation-1.m4a", "source": "Conversation 1"}];
const STORE_KEY = 'bahasa:quiz:v1';
const audio = document.getElementById('qaudio');

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; }
}
function saveProgress(p) { localStorage.setItem(STORE_KEY, JSON.stringify(p)); }
let progress = loadProgress();
function keyOf(item) { return item.source + '::' + item.term; }
function boxOf(item) { const k = keyOf(item); return (progress[k] && progress[k].box) || 0; }

let pool = ITEMS.slice();
let current = null;
let revealed = false;
let stopAt = null;

const cardEl = document.getElementById('card');
const tagFilter = document.getElementById('tagFilter');

function uniqueTags() { return [...new Set(ITEMS.map(d => d.tag))].sort(); }
tagFilter.innerHTML = '<option value="">All tags</option>' +
  uniqueTags().map(t => `<option value="${t}">${t}</option>`).join('');
tagFilter.addEventListener('change', () => { applyFilter(); pickNext(); });

function applyFilter() {
  const t = tagFilter.value;
  pool = t ? ITEMS.filter(d => d.tag === t) : ITEMS.slice();
}
applyFilter();

function weightedPick(items) {
  const weights = items.map(d => Math.max(1, 4 - boxOf(d)));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[items.length - 1];
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function renderCard() {
  if (!current) { cardEl.innerHTML = '<div class="empty">No quiz items for this tag.</div>'; return; }
  const promptText = current.mode === 'cloze'
    ? escapeHtml(current.cloze).replace('_____', '<span class="blank">_____</span>')
    : '🔊 Listen first, then reveal.';
  cardEl.innerHTML = `
    <div class="source">${current.source} · ${current.tag}</div>
    <div class="prompt">${promptText}</div>
    <div class="hint">clue: ${escapeHtml(current.hint)}</div>
    <div class="playrow"><button class="play" id="playBtn">&#9654; Play line</button></div>
    <button class="revealBtn" id="revealBtn">Reveal answer</button>
    <div class="reveal" id="revealBox">
      <div class="id">${current.sentenceHtml}</div>
      <div class="en">${current.translation ? escapeHtml(current.translation) : ''}</div>
    </div>
    <div class="rate" id="rateRow" hidden>
      <button class="rate-btn bad" id="btnBad">Missed it</button>
      <button class="rate-btn good" id="btnGood">Got it</button>
    </div>
  `;
  document.getElementById('playBtn').addEventListener('click', playLine);
  document.getElementById('revealBtn').addEventListener('click', reveal);
  document.getElementById('btnBad').addEventListener('click', () => rate(false));
  document.getElementById('btnGood').addEventListener('click', () => rate(true));
}

function playLine() {
  if (!current) return;
  stopAt = current.nextSec;
  const start = () => { audio.currentTime = current.sec; audio.play(); };
  if (audio.src.endsWith(current.audio) && audio.readyState >= 1) {
    start();
  } else {
    audio.src = current.audio;
    audio.addEventListener('loadedmetadata', start, {once:true});
    audio.load();
  }
}

audio.addEventListener('timeupdate', () => {
  if (stopAt !== null && audio.currentTime >= stopAt) { audio.pause(); stopAt = null; }
});

function reveal() {
  revealed = true;
  document.getElementById('revealBox').classList.add('shown');
  document.getElementById('rateRow').hidden = false;
}

function rate(good) {
  if (!current) return;
  const k = keyOf(current);
  const box = boxOf(current);
  progress[k] = { box: good ? Math.min(3, box + 1) : 0 };
  saveProgress(progress);
  pickNext();
}

function pickNext() {
  if (!pool.length) { current = null; renderCard(); renderStats(); return; }
  let next = weightedPick(pool);
  if (pool.length > 1 && current && next.term === current.term && next.source === current.source) next = weightedPick(pool);
  current = next;
  revealed = false;
  stopAt = null;
  renderCard();
  renderStats();
}

function renderStats() {
  const boxes = [0,0,0,0];
  ITEMS.forEach(d => boxes[boxOf(d)]++);
  document.getElementById('stats').textContent =
    `${ITEMS.length} quiz items — new ${boxes[0]}, learning ${boxes[1]+boxes[2]}, mastered ${boxes[3]}`;
  document.getElementById('deckInfo').textContent = pool.length + ' in current filter';
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all quiz progress?')) { progress = {}; saveProgress(progress); pickNext(); }
});

pickNext();
</script>
